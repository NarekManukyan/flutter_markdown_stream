name: flutter_markdown_stream
description: >-
  Flicker-free streaming Markdown widget for Flutter. Renders partial LLM
  token streams progressively, handling unclosed syntax gracefully.
version: 0.3.0
repository: https://github.com/NarekManukyan/flutter_markdown_stream
issue_tracker: https://github.com/NarekManukyan/flutter_markdown_stream/issues
homepage: https://github.com/NarekManukyan/flutter_markdown_stream

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_markdown_plus: ^1.0.7
  markdown: ^7.1.1

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter

topics:
  - markdown
  - streaming
  - llm
  - chat
  - ai
